id: v2-assess-vuln-nginx
info:
  name: Outdated Nginx
  author: surfaceaudit
  severity: high
  tags: [assessment, vulnerable_version, web]
  description: "Nginx version {service_version} is below 1.20.0"
match:
  condition: and
  matchers:
    - type: word
      field: banner
      words: [nginx]
    - type: version_compare
      field: service_version
      operator: lt
      version: "1.20.0"
assess:
  category: vulnerable_version
  severity: high
  description: "Nginx version {service_version} is below 1.20.0"
