id: v2-assess-vuln-openssh
info:
  name: Outdated OpenSSH
  author: surfaceaudit
  severity: high
  tags: [assessment, vulnerable_version]
  description: "OpenSSH version {service_version} is below 8.0"
match:
  condition: and
  matchers:
    - type: word
      field: banner
      words: [openssh]
    - type: version_compare
      field: service_version
      operator: lt
      version: "8.0"
assess:
  category: vulnerable_version
  severity: high
  description: "OpenSSH version {service_version} is below 8.0"
